<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akreditasi RS - Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gray-50">
  <div class="min-h-screen p-6">
    <!-- Header -->
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 mb-6">
      <h1 class="text-2xl font-bold text-gray-800">🏥 Dashboard Akreditasi RS</h1>
      <p class="text-gray-600 mt-1">Tracking kelengkapan dokumen akreditasi</p>
    </div>

    <!-- Stats Cards -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
      <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-5">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-sm text-gray-600">Total Dokumen</p>
            <p class="text-3xl font-bold text-gray-800 mt-1" id="totalDokumen">-</p>
          </div>
          <div class="bg-blue-100 p-3 rounded-lg">
            <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
            </svg>
          </div>
        </div>
      </div>

      <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-5">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-sm text-gray-600">Lengkap</p>
            <p class="text-3xl font-bold text-green-600 mt-1" id="lengkapDokumen">-</p>
          </div>
          <div class="bg-green-100 p-3 rounded-lg">
            <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
          </div>
        </div>
      </div>

      <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-5">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-sm text-gray-600">Draft/Review</p>
            <p class="text-3xl font-bold text-yellow-600 mt-1" id="draftDokumen">-</p>
          </div>
          <div class="bg-yellow-100 p-3 rounded-lg">
            <svg class="w-6 h-6 text-yellow-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
          </div>
        </div>
      </div>

      <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-5">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-sm text-gray-600">Persentase</p>
            <p class="text-3xl font-bold text-purple-600 mt-1" id="persentase">-</p>
          </div>
          <div class="bg-purple-100 p-3 rounded-lg">
            <svg class="w-6 h-6 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
            </svg>
          </div>
        </div>
      </div>
    </div>

    <!-- Progress Bar -->
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 mb-6">
      <h2 class="text-lg font-semibold text-gray-800 mb-3">Progress Keseluruhan</h2>
      <div class="w-full bg-gray-200 rounded-full h-4">
        <div id="progressBar" class="bg-green-600 h-4 rounded-full transition-all duration-500" style="width: 0%"></div>
      </div>
      <p class="text-sm text-gray-600 mt-2" id="progressText">0% kelengkapan</p>
    </div>

    <!-- Per BAB Progress -->
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 mb-6">
      <h2 class="text-lg font-semibold text-gray-800 mb-4">Progress per BAB</h2>
      <div id="perBabContainer" class="space-y-3">
        <p class="text-gray-500 text-center py-4">Loading...</p>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <button onclick="openInSheet()" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-lg transition">
        📊 Buka Google Sheets
      </button>
      <button onclick="exportLaporan()" class="bg-green-600 hover:bg-green-700 text-white font-medium py-3 px-4 rounded-lg transition">
        📤 Export Laporan
      </button>
      <button onclick="checkReminders()" class="bg-purple-600 hover:bg-purple-700 text-white font-medium py-3 px-4 rounded-lg transition">
        🔔 Cek Reminder
      </button>
    </div>

    <!-- Footer -->
    <div class="mt-8 text-center text-sm text-gray-600">
      <p>Template Akreditasi RS v1.0</p>
      <p class="mt-1">Dibuat dengan ❤️ untuk meningkatkan mutu akreditasi</p>
    </div>
  </div>

  <script>
    // Load dashboard data on page load
    window.onload = function() {
      loadDashboard();
    };

    function loadDashboard() {
      google.script.run
        .withSuccessHandler(displayDashboard)
        .withFailureHandler(handleError)
        .getDashboardData();
    }

    function displayDashboard(data) {
      // Update stats
      document.getElementById('totalDokumen').textContent = data.total;
      document.getElementById('lengkapDokumen').textContent = data.lengkap;
      document.getElementById('draftDokumen').textContent = data.draft + data.review;
      document.getElementById('persentase').textContent = data.persentase + '%';

      // Update progress bar
      document.getElementById('progressBar').style.width = data.persentase + '%';
      document.getElementById('progressText').textContent = `${data.persentase}% kelengkapan (${data.lengkap} dari ${data.total} dokumen)`;

      // Update per BAB
      const container = document.getElementById('perBabContainer');
      container.innerHTML = '';

      if (Object.keys(data.perBab).length === 0) {
        container.innerHTML = '<p class="text-gray-500 text-center py-4">Belum ada data</p>';
        return;
      }

      Object.keys(data.perBab).sort().forEach(bab => {
        const babData = data.perBab[bab];
        const percent = Math.round((babData.lengkap / babData.total) * 100);
        
        const babHTML = `
          <div>
            <div class="flex justify-between mb-1">
              <span class="text-sm font-medium text-gray-700">BAB ${bab}</span>
              <span class="text-sm text-gray-600">${babData.lengkap}/${babData.total} (${percent}%)</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-3">
              <div class="bg-green-600 h-3 rounded-full transition-all" style="width: ${percent}%"></div>
            </div>
          </div>
        `;
        container.innerHTML += babHTML;
      });
    }

    function handleError(error) {
      console.error('Error:', error);
      alert('Terjadi kesalahan: ' + error.message);
    }

    function openInSheet() {
      window.open('https://sheets.google.com', '_blank');
    }

    function exportLaporan() {
      google.script.run
        .withSuccessHandler(function(result) {
          if (result.success) {
            alert(result.message + '\n\nFile tersimpan di Google Drive Anda.');
          } else {
            alert('Gagal export: ' + result.error);
          }
        })
        .withFailureHandler(handleError)
        .exportLaporan();
    }

    function checkReminders() {
      google.script.run
        .withSuccessHandler(function(result) {
          if (result.success) {
            if (result.count === 0) {
              alert('✅ Tidak ada reminder aktif. Semua dokumen aman!');
            } else {
              let message = `⚠️ Ada ${result.count} dokumen yang perlu diperhatikan:\n\n`;
              result.reminders.forEach(r => {
                message += `• ${r.nama}\n  PIC: ${r.pic}\n  Deadline: ${new Date(r.deadline).toLocaleDateString('id-ID')}\n  Sisa: ${r.hariTersisa} hari\n\n`;
              });
              alert(message);
            }
          } else {
            alert(result.message);
          }
        })
        .withFailureHandler(handleError)
        .checkReminders();
    }
  </script>
</body>
</html>
