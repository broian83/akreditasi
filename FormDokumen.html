<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Dokumen - Akreditasi RS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gray-50">
  <div class="min-h-screen p-6">
    <div class="max-w-2xl mx-auto">
      <!-- Header -->
      <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 mb-6">
        <h1 class="text-xl font-bold text-gray-800">➕ Tambah Dokumen Baru</h1>
        <p class="text-gray-600 mt-1 text-sm">Isi form di bawah untuk menambahkan dokumen akreditasi</p>
      </div>

      <!-- Form -->
      <form id="formDokumen" class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 space-y-4">
        <!-- Nama Dokumen -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            Nama Dokumen <span class="text-red-500">*</span>
          </label>
          <input type="text" id="nama" required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500"
            placeholder="Contoh: SOP Pengkajian Pasien">
        </div>

        <!-- BAB -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            BAB <span class="text-red-500">*</span>
          </label>
          <select id="bab" required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500">
            <option value="">Pilih BAB</option>
            <option value="1">BAB 1 - Hak Pasien & Keluarga</option>
            <option value="2">BAB 2 - Pelayanan Pasien</option>
            <option value="3">BAB 3 - Manajemen Risiko</option>
            <option value="4">BAB 4 - Sumber Daya Manusia</option>
            <option value="5">BAB 5 - Fasilitas & Peralatan</option>
            <option value="6">BAB 6 - Manajemen Informasi</option>
            <option value="7">BAB 7 - Pengukuran & Analisis</option>
            <option value="8">BAB 8 - Peningkatan Mutu</option>
            <option value="9">BAB 9 - Tata Kelola</option>
          </select>
        </div>

        <!-- Standar -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            Standar
          </label>
          <input type="text" id="standar"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500"
            placeholder="Contoh: STK-01 Pelayanan Pasien">
        </div>

        <!-- Kriteria -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            Kriteria
          </label>
          <input type="text" id="kriteria"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500"
            placeholder="Contoh: KRT-01 Ada prosedur">
        </div>

        <!-- PIC -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            PIC (Penanggung Jawab) <span class="text-red-500">*</span>
          </label>
          <input type="text" id="pic" required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500"
            placeholder="Nama penanggung jawab">
        </div>

        <!-- Deadline -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            Deadline <span class="text-red-500">*</span>
          </label>
          <input type="date" id="deadline" required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500">
        </div>

        <!-- Status -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            Status Kelengkapan
          </label>
          <select id="status"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500">
            <option value="Belum Mulai">Belum Mulai</option>
            <option value="Draft">Draft</option>
            <option value="Review">Review</option>
            <option value="Lengkap">Lengkap</option>
          </select>
        </div>

        <!-- Skor -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            Skor Self-Assessment
          </label>
          <select id="skor"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500">
            <option value="">Pilih Skor</option>
            <option value="1">1 - Tidak ada</option>
            <option value="2">2 - Ada sebagian</option>
            <option value="3">3 - Ada sebagian besar</option>
            <option value="4">4 - Lengkap</option>
          </select>
        </div>

        <!-- Link File -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            Link File (Google Drive)
          </label>
          <input type="url" id="link"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500"
            placeholder="https://drive.google.com/...">
        </div>

        <!-- Catatan -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            Catatan
          </label>
          <textarea id="catatan" rows="3"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500"
            placeholder="Catatan tambahan..."></textarea>
        </div>

        <!-- Buttons -->
        <div class="flex gap-3 pt-4">
          <button type="submit"
            class="flex-1 bg-green-600 hover:bg-green-700 text-white font-medium py-3 px-4 rounded-lg transition">
            ✅ Simpan Dokumen
          </button>
          <button type="button" onclick="resetForm()"
            class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-medium py-3 px-4 rounded-lg transition">
            Reset
          </button>
        </div>
      </form>

      <!-- Loading -->
      <div id="loading" class="hidden mt-4 bg-white rounded-lg shadow-sm border border-gray-200 p-6 text-center">
        <svg class="animate-spin h-8 w-8 text-green-600 mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <p class="text-gray-600 mt-2">Menyimpan dokumen...</p>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('formDokumen').addEventListener('submit', function(e) {
      e.preventDefault();
      submitForm();
    });

    function submitForm() {
      const loading = document.getElementById('loading');
      loading.classList.remove('hidden');

      const data = {
        nama: document.getElementById('nama').value,
        bab: document.getElementById('bab').value,
        standar: document.getElementById('standar').value,
        kriteria: document.getElementById('kriteria').value,
        pic: document.getElementById('pic').value,
        deadline: document.getElementById('deadline').value,
        status: document.getElementById('status').value,
        skor: document.getElementById('skor').value,
        link: document.getElementById('link').value,
        catatan: document.getElementById('catatan').value
      };

      google.script.run
        .withSuccessHandler(function(result) {
          loading.classList.add('hidden');
          if (result.success) {
            alert(`✅ Dokumen berhasil ditambahkan!\n\nID: ${result.id}`);
            resetForm();
          } else {
            alert('❌ Gagal menyimpan: ' + result.error);
          }
        })
        .withFailureHandler(function(error) {
          loading.classList.add('hidden');
          alert('❌ Terjadi kesalahan: ' + error.message);
        })
        .tambahDokumen(data);
    }

    function resetForm() {
      document.getElementById('formDokumen').reset();
    }
  </script>
</body>
</html>
